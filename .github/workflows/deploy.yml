name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          cat > .env << 'ENVEOF'
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PASS=${{ secrets.DB_PASS }}
          APP_PORT=${{ secrets.APP_PORT }}
          ENVEOF

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASS: ${{ secrets.SSH_PASS }}
        run: |
          export SSHPASS="$SSH_PASS"
          SSH_CMD="sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT $SSH_USER@$SSH_HOST"
          SCP_CMD="sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P $SSH_PORT"

          # Create temp deploy dir on remote
          $SSH_CMD "mkdir -p /tmp/pagamentos-deploy/views /tmp/pagamentos-deploy/assets"

          # Upload application files
          $SCP_CMD \
            package.json \
            server.js helpers.js geo.js intelligence.js ncm.js \
            Dockerfile .dockerignore .env \
            $SSH_USER@$SSH_HOST:/tmp/pagamentos-deploy/

          # Upload views
          $SCP_CMD views/*.ejs $SSH_USER@$SSH_HOST:/tmp/pagamentos-deploy/views/

          # Upload assets
          $SCP_CMD assets/style.css $SSH_USER@$SSH_HOST:/tmp/pagamentos-deploy/assets/

          # Upload data files
          $SCP_CMD ncm.json municipios_ibge_cache.json $SSH_USER@$SSH_HOST:/tmp/pagamentos-deploy/

          # Write deploy script to remote
          $SSH_CMD "cat > /tmp/pagamentos-deploy.sh << 'SCRIPT'
          #!/bin/bash
          sudo mkdir -p /opt/pagamentos
          sudo cp -rf /tmp/pagamentos-deploy/. /opt/pagamentos/
          rm -rf /tmp/pagamentos-deploy /tmp/pagamentos-deploy.sh
          cd /opt/pagamentos
          sudo docker stop pagamentos 2>/dev/null || true
          sudo docker rm pagamentos 2>/dev/null || true
          sudo docker build -t pagamentos .
          sudo docker run -d \
            --name pagamentos \
            --restart unless-stopped \
            -p 4105:4105 \
            --env-file .env \
            pagamentos
          sudo docker image prune -f
          SCRIPT
          chmod +x /tmp/pagamentos-deploy.sh"

          # Execute deploy script with sudo password piped via stdin
          printf '%s\n' "$SSH_PASS" | $SSH_CMD "sudo -S bash /tmp/pagamentos-deploy.sh"

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASS: ${{ secrets.SSH_PASS }}
        run: |
          sleep 5
          export SSHPASS="$SSH_PASS"
          printf '%s\n' "$SSH_PASS" | sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $SSH_PORT $SSH_USER@$SSH_HOST "sudo -S docker ps --filter name=pagamentos --format '{{.Status}}'"
